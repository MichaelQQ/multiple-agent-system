max_proposed: 10

providers:
  claude-code:
    cli: claude
    max_concurrent: 2
    extra_args: []
  codex:
    cli: codex
    max_concurrent: 1
    extra_args: []
    # Not assigned a default role. Override tester or implementer in roles.yaml when quota allows.
  gemini:
    cli: gemini
    max_concurrent: 1
    extra_args: []
  ollama:
    cli: ollama
    max_concurrent: 4
    extra_args: []
  opencode:
    cli: opencode
    max_concurrent: 2
    extra_args: []

proposer_signals:
  # Optional command to run for CI/test output (stdout+stderr sampled).
  # ci_command: ["pytest", "-x", "-q"]

