roles:
  proposer:
    provider: claude-code
    model: claude-haiku-4-5-20251001
    timeout_s: 600
    max_retries: 2
    allowed_tools: [Read, Grep, Glob]
    permission_mode: bypassPermissions
  orchestrator:
    provider: claude-code
    model: claude-opus-4-6
    timeout_s: 1200
    max_retries: 2
    allowed_tools: [Read, Grep, Glob, Write]
    permission_mode: default
  implementer:
    provider: opencode
    timeout_s: 3600
    max_retries: 2
  tester:
    provider: opencode
    timeout_s: 1800
    max_retries: 2
  evaluator:
    provider: ollama
    model: gemma4:e4b
    timeout_s: 600
    max_retries: 1
    allowed_tools: [Read, Grep, Glob]
    permission_mode: bypassPermissions
